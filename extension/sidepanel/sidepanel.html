<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PostureGuard</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div class="panel">
    <!-- Header -->
    <header class="header">
      <h1 class="logo">PostureGuard</h1>
      <p class="tagline">AI-powered posture coaching</p>
    </header>

    <!-- Main Toggle -->
    <section class="section">
      <div class="toggle-row">
        <label for="posture-toggle">Enable Monitoring</label>
        <input type="checkbox" id="posture-toggle">
      </div>
      <div class="status-row">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Disabled</span>
      </div>
    </section>

    <!-- Posture Score -->
    <section class="section" id="score-section" style="display:none;">
      <h2>Posture Score</h2>
      <div class="score-display" id="score-display">--</div>
      <div class="score-label">out of 100</div>
    </section>

    <!-- Calibration -->
    <section class="section">
      <h2>Calibration</h2>
      <p class="hint">Sit in your ideal posture, then calibrate.</p>
      <button id="calibrate-btn" class="btn btn-primary">Calibrate Position</button>
      <span class="cal-status" id="cal-status">Not calibrated</span>
    </section>

    <!-- Settings -->
    <section class="section">
      <h2>Settings</h2>
      <div class="setting-row">
        <label for="threshold-slider">Alert Sensitivity</label>
        <input type="range" id="threshold-slider" min="15" max="120" value="30" step="5">
        <span class="setting-value" id="threshold-value">30s</span>
      </div>
      <div class="toggle-row">
        <label for="debug-toggle">Debug Mode</label>
        <input type="checkbox" id="debug-toggle">
      </div>
    </section>

    <!-- Session -->
    <section class="section" id="session-section" style="display:none;">
      <h2>Session</h2>
      <div class="session-stats">
        <div class="stat">
          <span class="stat-value" id="session-duration">0m</span>
          <span class="stat-label">Duration</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="session-avg">--</span>
          <span class="stat-label">Avg Score</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="session-alerts">0</span>
          <span class="stat-label">Alerts</span>
        </div>
      </div>
      <button id="report-btn" class="btn btn-secondary">Generate Report</button>
    </section>

    <!-- QR Code -->
    <section class="section" id="qr-section" style="display:none;">
      <h2>Session Report</h2>
      <p class="hint">Scan to view your report on mobile</p>
      <div id="qr-container"></div>
    </section>

    <!-- API Key -->
    <section class="section">
      <h2>Claude API Key</h2>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." class="input">
      <button id="save-key-btn" class="btn btn-small">Save</button>
    </section>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
